<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExamAgent · 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #eef7ff 0%, #ffffff 70%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
            color: #1e293b;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem 2.5rem;
            box-shadow: 0 12px 30px rgba(66, 153, 225, 0.12);
            border: 1px solid rgba(66, 153, 225, 0.15);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .config-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            min-width: 160px;
        }

        .config-item label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
        }

        input, select {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .upload-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .upload-box {
            flex: 1;
            min-width: 240px;
            border: 2px dashed #94a3b8;
            border-radius: 16px;
            padding: 1.8rem 1.5rem;
            text-align: center;
            background: #f9fafb;
            color: #475569;
            cursor: pointer;
            transition: all 0.25s;
        }

        .upload-box:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #1e293b;
        }

        .file-list {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            list-style: none;
            padding-left: 0;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
        }

        .file-list li {
            padding: 0.3rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #2c3e50;
        }

        .file-list li span.remove-btn {
            cursor: pointer;
            color: #e74c3c;
            font-weight: bold;
            margin-left: 0.5rem;
        }

        .upload-box p {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.25s;
            text-align: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }

        .btn-outline:hover {
            background: #eff6ff;
        }

        .tabs {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            padding: 0.5rem 1.3rem;
            border-radius: 20px;
            border: none;
            background: #f1f5f9;
            color: #475569;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }

        .result-content {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 2rem;
            max-height: 55vh;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #334155;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #64748b;
        }

        hr {
            border: 0.5px solid #e2e8f0;
            margin: 2rem 0;
        }

        .footer-note {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem 1.2rem;
            }
            h1 {
                font-size: 2rem;
            }
            .config-row {
                flex-direction: column;
                gap: 0.8rem;
            }
            .config-item {
                min-width: 100%;
            }
            .upload-row {
                flex-direction: column;
                gap: 1rem;
            }
            .upload-box {
                min-width: 100%;
            }
            .btn {
                width: 100%;
                padding: 0.8rem 1rem;
            }
            .tabs {
                justify-content: flex-start;
                overflow-x: auto;
                white-space: nowrap;
                flex-wrap: nowrap;
                padding-bottom: 0.5rem;
            }
            .tab-btn {
                flex-shrink: 0;
                font-size: 0.85rem;
                padding: 0.5rem 1rem;
            }
            .result-content {
                max-height: 50vh;
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }
            .subtitle {
                font-size: 0.95rem;
            }
            .file-list {
                max-height: 80px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="main-container">
        <div class="card">
            <h1>🩺 MedExamAgent</h1>
            <p class="subtitle">AI 驱动的医学考点提炼 · 专业版</p>

            <div class="config-row">
                <div class="config-item" style="flex:2;">
                    <label>🔑 DeepSeek API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-...">
                </div>
                <div class="config-item">
                    <label>🤖 模型</label>
                    <select id="model">
                        <option value="deepseek-chat">DeepSeek-Chat</option>
                        <option value="deepseek-reasoner">DeepSeek-Reasoner</option>
                    </select>
                </div>
                <div class="config-item" style="flex:0.8;">
                    <label>🌡️ 创造性</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.2">
                </div>
            </div>

            <div class="upload-row">
                <div class="upload-box" id="pptUploadArea">
                    📊 点击添加课程 PPT / PDF 讲义
                    <br><span style="font-size:0.8rem;opacity:0.7;">可多次点击，添加多份讲义 (.pptx 或 .pdf)</span>
                    <input type="file" id="pptFileInput" accept=".pptx,.pdf" hidden>
                    <ul class="file-list" id="pptFileList">
                        <li style="opacity:0.7;">未添加任何讲义文件</li>
                    </ul>
                </div>
                <div class="upload-box" id="pdfUpload">
                    📘 点击上传教材 PDF (.pdf)
                    <input type="file" id="pdfFile" accept=".pdf" hidden>
                    <p id="pdfName">未选择文件</p>
                </div>
            </div>

            <button class="btn btn-primary" id="generateBtn" style="width:100%;">
                🚀 开始生成考点
            </button>
        </div>

        <div id="loading" class="loading" hidden>
            ⏳ 正在处理中，请稍候...
        </div>

        <div class="card" id="resultCard" hidden>
            <div class="tabs" id="tabs"></div>
            <div class="result-content" id="resultContent"></div>
            <button class="btn btn-outline" id="downloadBtn" style="margin-top:1.5rem; width:100%;" hidden>
                📥 下载全部考点 (Markdown)
            </button>
        </div>

        <div class="footer-note">
            仅供学习参考，不构成医学建议
        </div>
    </div>

    <script>
        // ---------- 粒子特效 ----------
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        let mouse = { x: -1000, y: -1000 };
        const PARTICLE_COUNT = 60;
        const CONNECTION_DIST = 70;
        const MOUSE_RADIUS = 80;

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2 + 0.8;
                this.opacity = Math.random() * 0.2 + 0.1;
            }
            update() {
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS) {
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
                    const angle = Math.atan2(dy, dx);
                    this.vx += Math.cos(angle) * force * 0.02;
                    this.vy += Math.sin(angle) * force * 0.02;
                }
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                this.vx *= 0.99;
                this.vy *= 0.99;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(59, 130, 246, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(59, 130, 246, ${0.15 * (1 - dist / CONNECTION_DIST)})`;
                        ctx.lineWidth = 0.4;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            connectParticles();
            requestAnimationFrame(animate);
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();

        // ---------- 多文件列表 ----------
        let pptFilesArray = [];
        const pptUploadArea = document.getElementById('pptUploadArea');
        const pptFileInput = document.getElementById('pptFileInput');
        const pptFileList = document.getElementById('pptFileList');

        pptUploadArea.addEventListener('click', () => pptFileInput.click());

        pptFileInput.addEventListener('change', () => {
            const newFiles = Array.from(pptFileInput.files);
            newFiles.forEach(file => {
                const exists = pptFilesArray.some(f => f.name === file.name && f.size === file.size);
                if (!exists) {
                    pptFilesArray.push(file);
                }
            });
            renderPPTFileList();
            pptFileInput.value = '';
        });

        function renderPPTFileList() {
            pptFileList.innerHTML = '';
            if (pptFilesArray.length === 0) {
                pptFileList.innerHTML = '<li style="opacity:0.7;">未添加任何讲义文件</li>';
                return;
            }
            pptFilesArray.forEach((file, index) => {
                const li = document.createElement('li');
                li.innerHTML = `✅ ${file.name} <span class="remove-btn" onclick="removePPTFile(${index})">✕</span>`;
                pptFileList.appendChild(li);
            });
        }

        window.removePPTFile = function(index) {
            pptFilesArray.splice(index, 1);
            renderPPTFileList();
        };

        // ---------- PDF 教材上传 ----------
        function setupPDFUpload() {
            const box = document.getElementById('pdfUpload');
            const input = document.getElementById('pdfFile');
            const nameEl = document.getElementById('pdfName');
            box.addEventListener('click', () => input.click());
            input.addEventListener('change', () => {
                if (input.files.length > 0) {
                    nameEl.textContent = '✅ ' + input.files[0].name;
                    nameEl.style.color = '#3b82f6';
                } else {
                    nameEl.textContent = '未选择文件';
                    nameEl.style.color = '#94a3b8';
                }
            });
        }
        setupPDFUpload();

        // ---------- 生成考点 ----------
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const pdfFile = document.getElementById('pdfFile').files[0];

            if (!apiKey || pptFilesArray.length === 0 || !pdfFile) {
                alert('请填写 API Key，并至少添加一个讲义文件和一个教材 PDF');
                return;
            }

            const formData = new FormData();
            pptFilesArray.forEach(file => formData.append('ppt', file));
            formData.append('pdf', pdfFile);
            formData.append('api_key', apiKey);
            formData.append('model', document.getElementById('model').value);
            formData.append('temperature', document.getElementById('temperature').value);
            // 不再发送 search_engine 和 max_results

            document.getElementById('loading').hidden = false;
            document.getElementById('resultCard').hidden = true;

            try {
                const res = await fetch('http://localhost:8000/generate', {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                if (json.status === 'ok') {
                    renderResults(json.data);
                } else {
                    alert('生成失败：' + json.message);
                }
            } catch (err) {
                alert('网络错误：' + err.message);
            } finally {
                document.getElementById('loading').hidden = true;
            }
        });

        function renderResults(data) {
            const tabsContainer = document.getElementById('tabs');
            const contentDiv = document.getElementById('resultContent');
            tabsContainer.innerHTML = '';
            let allContent = '';

            data.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
                btn.textContent = item.section;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    contentDiv.innerHTML = item.content.replace(/\n/g, '<br>');
                });
                tabsContainer.appendChild(btn);
                allContent += (index > 0 ? '\n\n---\n\n' : '') + item.content;
            });

            contentDiv.innerHTML = data[0].content.replace(/\n/g, '<br>');
            document.getElementById('resultCard').hidden = false;

            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.hidden = false;
            downloadBtn.onclick = () => {
                const blob = new Blob([allContent], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'medexam_points.md';
                a.click();
                URL.revokeObjectURL(url);
            };
        }
    </script>
</body>
</html>
